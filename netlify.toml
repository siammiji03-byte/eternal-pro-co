[build]
  publish = "."

# Cache headers for performance
[[headers]]
  for = "/assets/video/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Pretty URL redirects
[[redirects]]
  from = "/audit"
  to = "https://tally.so/r/rjox22"
  status = 302
  force = true

[[redirects]]
  from = "/instagram"
  to = "https://www.instagram.com/eternalproperty_co"
  status = 302
  force = true
